name: k6 performance test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test application
        run: mvn -B verify

      - name: Start application
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "skola-stranih-jezika-*.jar" ! -name "*.original" | head -n 1)
          java -jar "$JAR_FILE" \
            --spring.profiles.active=test \
            --server.port=18080 > target/k6-application.log 2>&1 &

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --user admin:admin123 http://localhost:18080/api/statistika > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat target/k6-application.log
          exit 1

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 API load test
        run: k6 run -e BASE_URL=http://localhost:18080 performance/k6/api-load-test.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            target/k6-summary.json
            target/k6-application.log
