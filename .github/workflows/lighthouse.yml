name: Lighthouse frontend quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and test application
        run: mvn -B verify

      - name: Start application
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "skola-stranih-jezika-*.jar" ! -name "*.original" | head -n 1)
          java -jar "$JAR_FILE" \
            --spring.profiles.active=test \
            --server.port=18080 > target/lighthouse-application.log 2>&1 &

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --user admin:admin123 http://localhost:18080/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat target/lighthouse-application.log
          exit 1

      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun --config=lighthouserc.json

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: |
            target/lighthouse
            target/lighthouse-application.log
