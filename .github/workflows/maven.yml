name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      - name: Postavljanje JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: maven

      - name: Izgradnja i testiranje
        run: mvn -B clean verify
