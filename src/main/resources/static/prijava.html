<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava - Skola stranih jezika</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f6f9; color: #172033; font-family: "Segoe UI", Arial, sans-serif; }
        main { width: min(430px, calc(100% - 32px)); background: white; border: 1px solid #d8dee8; border-top: 5px solid #1f5a7a; border-radius: 6px; padding: 25px; }
        h1 { margin: 0 0 7px; font-size: 23px; }
        p { margin: 0 0 20px; color: #647084; }
        label { display: block; margin: 12px 0 5px; font-size: 13px; font-weight: 600; }
        input { width: 100%; min-height: 42px; border: 1px solid #bac4d1; border-radius: 4px; padding: 9px 10px; font: inherit; }
        button { width: 100%; margin-top: 18px; border: 0; border-radius: 5px; padding: 11px; color: white; background: #1f5a7a; font: inherit; font-weight: 600; cursor: pointer; }
        .error { min-height: 20px; margin-top: 14px; color: #a43d3d; font-size: 13px; }
    </style>
</head>
<body>
<main>
    <h1>Privatna skola stranih jezika</h1>
    <p>Prijava vazi samo u ovoj kartici.</p>
    <form id="loginForm">
        <label for="korisnickoIme">Korisnicko ime</label>
        <input id="korisnickoIme" autocomplete="username" required autofocus>
        <label for="lozinka">Lozinka</label>
        <input id="lozinka" type="password" autocomplete="current-password" required>
        <button type="submit">Prijavi se</button>
        <div id="greska" class="error"></div>
    </form>
</main>
<script>
    if (sessionStorage.getItem("tabToken")) window.location.replace("/");

    document.getElementById("loginForm").addEventListener("submit", async event => {
        event.preventDefault();
        const greska = document.getElementById("greska");
        greska.textContent = "";
        try {
            const response = await fetch("/api/tab-session/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    korisnickoIme: document.getElementById("korisnickoIme").value,
                    lozinka: document.getElementById("lozinka").value
                })
            });
            if (!response.ok) throw new Error("Pogresno korisnicko ime ili lozinka.");
            const rezultat = await response.json();
            sessionStorage.setItem("tabToken", rezultat.token);
            window.location.replace("/");
        } catch (error) {
            greska.textContent = error.message;
        }
    });
</script>
</body>
</html>
